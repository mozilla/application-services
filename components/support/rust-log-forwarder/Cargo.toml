[package]
name = "rust-log-forwarder"
version = "0.1.0"
edition = "2021"
authors = ["Sync Team <sync-team@mozilla.com>"]
license = "MPL-2.0"
exclude = ["/android", "/ios"]

[dependencies]
uniffi = { git = "https://github.com/bendk/uniffi-rs", rev = "498cdcf9b0e060bc29848bd6896e4635ec890f22" }
error-support = { path = "../error", default-features = false, features = ["tracing-logging"] }
tracing-subscriber = { version = "0.3", default-features = false, features = ["fmt", "std"] }
tracing-support = { path = "../tracing" }

[dev-dependencies]
tracing = "0.1"

[build-dependencies]
uniffi = { git = "https://github.com/bendk/uniffi-rs", rev = "498cdcf9b0e060bc29848bd6896e4635ec890f22", features=["build"]}
