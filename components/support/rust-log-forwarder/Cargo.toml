[package]
name = "rust-log-forwarder"
version = "0.1.0"
edition = "2021"
authors = ["Sync Team <sync-team@mozilla.com>"]
license = "MPL-2.0"
exclude = ["/android", "/ios"]

[dependencies]
uniffi = { git = "https://github.com/mozilla/uniffi-rs", rev = "33469c071119ac884a93682b132e8f661a080542" }
error-support = { path = "../error", default-features = false }
tracing-subscriber = { version = "0.3", default-features = false, features = ["fmt", "std"] }
tracing-support = { path = "../tracing" }

[dev-dependencies]
tracing = "0.1"

[build-dependencies]
uniffi = { git = "https://github.com/mozilla/uniffi-rs", rev = "33469c071119ac884a93682b132e8f661a080542", features=["build"]}
