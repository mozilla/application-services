[package]
name = "relay"
version = "0.1.0"
edition = "2021"
exclude = ["/android"]

[dependencies]
error-support = { path = "../support/error" }
log = "0.4"
remote_settings = { path = "../remote_settings" }
serde = { version = "1", features=["derive"] }
serde_json = "1"
thiserror = "2"
url = "2"
viaduct = { path = "../viaduct" }
uniffi = { git = "https://github.com/mozilla/uniffi-rs", rev = "7d647a85a1258d4795e551048eb900193083365c" }

[dev-dependencies]
expect-test = "1.4"
mockito = { version = "0.31", default-features = false}
viaduct-dev = { path = "../support/viaduct-dev"}

[build-dependencies]
uniffi = { git = "https://github.com/mozilla/uniffi-rs", rev = "7d647a85a1258d4795e551048eb900193083365c", features=["build"]}
