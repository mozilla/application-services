[package]
name = "merino"
version = "0.1.0"
edition = "2021"
exclude = ["/android"]

[dependencies]
uniffi = { git = "https://github.com/mozilla/uniffi-rs", rev = "7d647a85a1258d4795e551048eb900193083365c" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
url = "2"
viaduct = { path = "../viaduct", features = ["ohttp"] }
error-support = { path = "../support/error" }
thiserror = "2"

[build-dependencies]
uniffi = { git = "https://github.com/mozilla/uniffi-rs", rev = "7d647a85a1258d4795e551048eb900193083365c", features = ["build"] }
