---
$schema: moz://mozilla.org/schemas/glean/metrics/2-0-0

places_manager:
  run_maintenance_time:
    type: timing_distribution
    description: Time taken to execute `run_maintenance()`
    time_unit: millisecond
    bugs:
      - https://github.com/mozilla/application-services/issues/5115
    data_reviews:
      - https://github.com/mozilla/application-services/issues/5122
      - https://github.com/mozilla/application-services/issues/5387
      - https://github.com/mozilla/application-services/issues/5830
    notification_emails:
      - synced-client-integrations@mozilla.com
      - bdk@mozilla.com
    expires: "never"
    data_sensitivity:
      - technical
    no_lint: [COMMON_PREFIX]

  run_maintenance_prune_time:
    type: timing_distribution
    description: |
      Time taken to execute `prune_older_visits()` inside `run_maintenance()`
    time_unit: millisecond
    bugs:
      - https://github.com/mozilla/application-services/issues/5246
    data_reviews:
      - https://github.com/mozilla/application-services/issues/5247
      - https://github.com/mozilla/application-services/issues/5387
      - https://github.com/mozilla/application-services/issues/5830
    notification_emails:
      - synced-client-integrations@mozilla.com
      - bdk@mozilla.com
    expires: "never"
    data_sensitivity:
      - technical
    no_lint: [COMMON_PREFIX]

  run_maintenance_vacuum_time:
    type: timing_distribution
    description: |
      Time taken to execute `VACUUM` inside `run_maintenance()`
    time_unit: millisecond
    bugs:
      - https://github.com/mozilla/application-services/issues/5246
    data_reviews:
      - https://github.com/mozilla/application-services/issues/5247
      - https://github.com/mozilla/application-services/issues/5387
      - https://github.com/mozilla/application-services/issues/5830
    notification_emails:
      - synced-client-integrations@mozilla.com
      - bdk@mozilla.com
    expires: "never"
    data_sensitivity:
      - technical
    no_lint: [COMMON_PREFIX]

  run_maintenance_optimize_time:
    type: timing_distribution
    description: |
      Time taken to execute `PRAGMA optimize` inside `run_maintenance()`
    time_unit: millisecond
    bugs:
      - https://github.com/mozilla/application-services/issues/5246
    data_reviews:
      - https://github.com/mozilla/application-services/issues/5247
      - https://github.com/mozilla/application-services/issues/5387
      - https://github.com/mozilla/application-services/issues/5830
    notification_emails:
      - synced-client-integrations@mozilla.com
      - bdk@mozilla.com
    expires: "never"
    data_sensitivity:
      - technical
    no_lint: [COMMON_PREFIX]

  run_maintenance_chk_pnt_time:
    type: timing_distribution
    description: |
      Time taken to execute `PRAGMA_CHECKPOINT` inside `run_maintenance()`
    time_unit: millisecond
    bugs:
      - https://github.com/mozilla/application-services/issues/5246
    data_reviews:
      - https://github.com/mozilla/application-services/issues/5247
      - https://github.com/mozilla/application-services/issues/5387
      - https://github.com/mozilla/application-services/issues/5830
    notification_emails:
      - synced-client-integrations@mozilla.com
      - bdk@mozilla.com
    expires: "never"
    data_sensitivity:
      - technical
    no_lint: [COMMON_PREFIX]
  db_size_after_maintenance:
    type: memory_distribution
    description: >
      Size of the db after executing `run_maintenance()`
    memory_unit: kilobyte
    bugs:
      - https://github.com/mozilla/application-services/issues/5115
    data_reviews:
      - https://github.com/mozilla/application-services/issues/5122
      - https://github.com/mozilla/application-services/issues/5387
      - https://github.com/mozilla/application-services/issues/5830
    notification_emails:
      - synced-client-integrations@mozilla.com
      - bdk@mozilla.com
    expires: "never"
    data_sensitivity:
      - technical
