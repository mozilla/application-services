[package]
name = "push"
edition = "2021"
version = "0.1.0"
authors = ["jrconlin <me+crypt@jrconlin.com>", "Phil Jenvey <pjenvey@underboss.org>"]
license = "MPL-2.0"
exclude = ["/android", "/ios"]

[dependencies]
serde = "1"
serde_json = "1"
bincode = "1.2"
lazy_static = "1.4"
base64 = "0.21"
log = "0.4"
rusqlite = { version = "0.33.0", features = ["bundled", "unlock_notify"] }
url = "2.2"
viaduct = { path = "../viaduct" }
error-support = { path = "../support/error" }
sql-support = { path = "../support/sql" }
rc_crypto = { path = "../support/rc_crypto", features = ["ece"] }
thiserror = "1.0"
uniffi = { version = "0.28.2" }
types = { path = "../support/types" }

[build-dependencies]
uniffi = { version = "0.28.2", features = ["build"] }

[dev-dependencies]
env_logger = { version = "0.10", default-features = false, features = ["humantime"] }
mockito = "0.31"
hex = "0.4"
tempfile = "3.1.0"
mockall = "0.11"
viaduct-reqwest = { path = "../support/viaduct-reqwest" }

# Temp hack for uniffi 0.28 generated code, will not be necessary after next uniffi update.
[lints.clippy]
empty-line-after-doc-comments = "allow"
